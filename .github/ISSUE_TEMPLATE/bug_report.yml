name: Bug report
description: Report reproducible incorrect behavior
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private market data or credentials. Report vulnerabilities through private security reporting.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include compiler, OS, CMake options, input shape, and commands.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
